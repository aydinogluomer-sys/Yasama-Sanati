# Keeps the free-tier Supabase project (yasama-sanati) from auto-pausing.
# Paused projects drop their API from DNS and the newsletter / ön-kayıt forms
# silently fail with "Bir hata oluştu" (see docs/issues.md, 2026-07-12).
#
# Setup (one-time, repo Settings → Secrets and variables → Actions):
#   SUPABASE_URL      = https://htpduorvqmidoprkkgwy.supabase.co
#   SUPABASE_ANON_KEY = the publishable anon key (NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY)
name: Supabase keep-alive

on:
  schedule:
    # Twice a week (Mon & Thu 06:17 UTC) — well inside the ~7-day pause window.
    - cron: "17 6 * * 1,4"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "::error::SUPABASE_URL / SUPABASE_ANON_KEY secrets are not configured"; exit 1
          fi
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            "${SUPABASE_URL}/rest/v1/newsletter_signups?select=id&limit=1")
          echo "Supabase responded with HTTP ${code}"
          # 200 (RLS allows select) and 401/403/406 (blocked but ALIVE) all count as activity.
          case "$code" in
            200|401|403|406) exit 0 ;;
            *) echo "::error::Unexpected status ${code} — project may be paused"; exit 1 ;;
          esac
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
